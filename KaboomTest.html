<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaboom</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins';
  background:#0b1020;
  color:white;
}

#splash {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:15px;
}

.container {
  max-width:700px;
  margin:auto;
  display:none;
  padding:10px;
}

.header {
  font-size:20px;
  font-weight:600;
}

.grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  padding:10px 0;
}

.cell {
  perspective:1000px;
  height:70px;
}

.inner {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.5s;
}

.cell.flip .inner {
  transform:rotateY(180deg);
}

.face {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  backface-visibility:hidden;
  background:#1b2550;
  font-weight:600;
}

.back {
  transform:rotateY(180deg);
  background:#020617;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input {
  padding:10px;
  border-radius:6px;
  border:none;
  font-size:16px;
}

/* jugadores */
.playerInput {
  display:block;
  width:200px;
  margin:8px auto;
}

/* opciones */
.optionRow {
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:220px;
  margin:5px auto;
}

.optionRow input {
  width:60px;
}

/* starter */
.starterRow {
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:260px;
  margin:10px auto;
}

.starterRow select {
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#1b2550;
  color:white;
  font-family:'Poppins';
}

/* modal */
#modal,#endModal {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.85);
}

.card {
  background:#121a33;
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:90%;
  max-width:400px;
}

.playerBoard {
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.active {
  outline:2px solid #38bdf8;
}
</style>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>


<body>

<div id="splash">
  <h1>💣 KABOOM!</h1>

  <div>
    <button onclick="selectPlayers(1)">1 jugador</button>
    <button onclick="selectPlayers(2)">2 jugadores</button>
  </div>

  <div id="inputs"></div>

  <div id="options" style="display:none">
    <div class="optionRow">
      <label>Kabooms</label>
      <input type="number" id="kabooms" value="5">
    </div>

    <div class="optionRow">
      <label>Corazones</label>
      <input type="number" id="hearts" value="5">
    </div>

    <div id="starterSelect" class="starterRow" style="display:none">
      <label>¿Quién empieza?</label>
      <select id="starter">
        <option value="random">Aleatorio</option>
        <option value="0">Jugador 1</option>
        <option value="1">Jugador 2</option>
      </select>
    </div>
  </div>

  <button id="startBtn" style="display:none" onclick="startGame()">Jugar</button>
</div>

<div class="container" id="game">
  <div class="header">💣 Kaboom</div>
  <div id="remaining"></div>
  <div id="turn"></div>
  <div id="players" class="playerBoard"></div>
  <div class="grid" id="grid"></div>
  <button onclick="newGame()">Nueva Partida</button>
  <button onclick="goMenu()">Menú Principal</button>
</div>

<div id="modal">
  <div class="card">
    <h3>Pregunta</h3>
    <p id="q"></p>
    <button onclick="toggleAnswer()">Mostrar respuesta</button>
    <p id="a" style="display:none"></p>
    <p><b>¿Se ha acertado la respuesta?</b></p>
    <button onclick="answer(true)">Sí (+4)</button>
    <button onclick="answer(false)">No</button>
  </div>
</div>

<div id="endModal">
  <div class="card" id="endContent"></div>
</div>

<script>
let players=[], scores=[], currentPlayer=0;
let questions=[], questionPool=[];
let remaining=0;
let currentCell=null;
let numKabooms=5, numHearts=5;
let lockBoard = false;

function selectPlayers(n){
 let html='';
 for(let i=0;i<n;i++){
  let def = i===0 ? 'Salva' : 'Julia';
  html += `<input class="playerInput" value="${def}">`;
 }
 inputs.innerHTML = html;

 options.style.display='block';
 startBtn.style.display = 'block';
 starterSelect.style.display = n==2 ? 'block' : 'none';
}

async function startGame(){

 players=[]; scores=[];

 document.querySelectorAll('.playerInput').forEach(inp=>{
  players.push(inp.value);
  scores.push(0);
 });

 numKabooms = parseInt(kabooms.value)||5;
 numHearts = parseInt(hearts.value)||5;

 if(numKabooms + numHearts > 30){
  alert("Demasiados elementos");
  return;
 }

 await loadQuestions();

 if(players.length==2){
  let s = starter.value;
  currentPlayer = s==='random' ? Math.floor(Math.random()*2) : parseInt(s);
 }

 splash.style.display='none';
 game.style.display='block';

 newGame();
}

function goMenu(){
 game.style.display='none';
 splash.style.display='flex';
}

async function loadQuestions(){
 try{
  const res = await fetch('preguntas.json');
  questionPool = await res.json();
 }catch{
  questionPool=[{q:'2+2',a:'4'}];
 }
}

function newGame(){
 questions=[...questionPool];
 grid.innerHTML='';

 let letters=['A','B','C','D','E','F'];
 let qCount = 30 - numKabooms - numHearts;

 remaining = qCount;

 let items=[
  ...Array(qCount).fill('q'),
  ...Array(numKabooms).fill('kaboom'),
  ...Array(numHearts).fill('heart')
 ].sort(()=>Math.random()-0.5);

 items.forEach((t,i)=>{
  let row=Math.floor(i/6)+1;
  let col=letters[i%6];

  let c=document.createElement('div');
  c.className='cell';

  c.innerHTML=`
   <div class="inner">
     <div class="face">${col}${row}</div>
     <div class="face back"></div>
   </div>`;

  c.onclick=()=>clickCell(c,t);
  grid.appendChild(c);
 });

 updateUI();
}

function clickCell(cell,type){
 if(lockBoard) return;
 if(cell.classList.contains('flip')) return;

 cell.classList.add('flip');

 let back = cell.querySelector('.back');

 if(type==='heart'){
  scores[currentPlayer]+=5;
  back.innerHTML='+5 ❤️';
  next();
 }
 else if(type==='kaboom'){
  scores[currentPlayer]-=5;
  back.innerHTML='💣';
  next();
 }
 else{
 lockBoard = true; 
  currentCell=back;
  let q=questions.pop();
  document.getElementById('q').innerText=q.q;
  document.getElementById('a').innerText=q.a;
  document.getElementById('a').style.display='none';
  modal.style.display='flex';
 }

 updateUI();
}

function toggleAnswer(){
 a.style.display = a.style.display==='none'?'block':'none';
}

function answer(ok){
 lockboard = false;
 modal.style.display='none';
 remaining--;

 if(ok){
  scores[currentPlayer]+=4;
  currentCell.innerHTML='Q +4';
 }else{
  currentCell.innerHTML='Q 0';
 }

 if(remaining<=0){
  endGame();
 }else{
  next();
 }

 updateUI();
}

function next(){
 currentPlayer=(currentPlayer+1)%players.length;
}

function updateUI(){
 turn.innerText='Turno de: '+players[currentPlayer];
 remaining.innerText='Total preguntas: '+remaining;

 playersDiv = players.map((p,i)=>
  `<div class="${i===currentPlayer?'active':''}">${p}: ${scores[i]}</div>`
 ).join('');

 document.getElementById('players').innerHTML = playersDiv;
}

function endGame(){

 let winner = players.map((p,i)=>({p,score:scores[i]}))
  .sort((a,b)=>b.score-a.score)[0];

 endContent.innerHTML = `
  <h2>🎉 Ganador 🎉</h2>
  <h1>${winner.p}</h1>
  <p>${winner.score} puntos</p>
  <br>
  <button onclick="goMenu(); endModal.style.display='none'">Menú principal</button>
 `;

 endModal.style.display='flex';
 confetti();
}

function confetti(){
 for(let i=0;i<80;i++){
  let c=document.createElement('div');
  c.style.position='fixed';
  c.style.width='6px';
  c.style.height='6px';
  c.style.background=`hsl(${Math.random()*360},100%,50%)`;
  c.style.top='0';
  c.style.left=Math.random()*100+'%';
  document.body.appendChild(c);

  let fall=setInterval(()=>{
    c.style.top=(parseFloat(c.style.top)+5)+'px';
  },30);

  setTimeout(()=>{clearInterval(fall); c.remove();},2000);
 }
}
</script>

</body>
</html>
