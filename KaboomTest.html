<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaboom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {margin:0;font-family:'Poppins';background:#0b1020;color:white}
#splash {position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px}
.container {max-width:700px;margin:auto;display:none;padding:10px}
.header {display:flex;align-items:center;gap:10px;font-size:20px;font-weight:600}
.grid {display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px 0}
.cell {perspective:1000px;height:70px}
.inner {width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:0.5s}
.cell.flip .inner {transform:rotateY(180deg)}
.face {position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:10px;backface-visibility:hidden;background:#1b2550;font-weight:600}
.back {transform:rotateY(180deg);background:#020617}
button {padding:10px;border:none;border-radius:8px;cursor:pointer}
input {padding:8px;border-radius:6px;border:none}
#modal,#endModal {position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85)}
.card {background:#121a33;padding:20px;border-radius:12px;text-align:center;width:90%;max-width:400px}
.actions {display:flex;gap:10px;justify-content:center;margin-top:10px}
.playerBoard {display:flex;justify-content:space-around;margin-top:10px}
.active {outline:2px solid #38bdf8}
</style>
</head>

<body>

<div id="splash">
  <h1>💣 KABOOM!</h1>

  <div>
    <button onclick="selectPlayers(1)">1 jugador</button>
    <button onclick="selectPlayers(2)">2 jugadores</button>
  </div>

  <div id="inputs"></div>

  <!-- OPCIONES -->
  <div id="options" style="display:none">
    <p>Kabooms: <input type="number" id="kabooms" value="5"></p>
    <p>Corazones: <input type="number" id="hearts" value="5"></p>
    <div id="starterSelect" style="display:none">
      <p>¿Quién empieza?</p>
      <select id="starter">
        <option value="random">Aleatorio</option>
        <option value="0">Jugador 1</option>
        <option value="1">Jugador 2</option>
      </select>
    </div>
  </div>

  <button id="startBtn" style="display:none" onclick="startGame()">Jugar</button>
</div>

<div class="container" id="game">
  <div class="header">💣 Kaboom</div>
  <div id="remaining"></div>
  <div id="turn"></div>
  <div id="players" class="playerBoard"></div>
  <div class="grid" id="grid"></div>
  <button onclick="newGame()">Nueva Partida</button>
  <button onclick="goMenu()">Menú Principal</button>
</div>

<div id="modal">
  <div class="card">
    <h3>Pregunta</h3>
    <p id="q"></p>
    <button onclick="toggleAnswer()">Mostrar respuesta</button>
    <p id="a" style="display:none"></p>
    <p><b>¿Se ha acertado la respuesta?</b></p>
    <div class="actions">
      <button onclick="answer(true)">Sí (+4)</button>
      <button onclick="answer(false)">No</button>
    </div>
  </div>
</div>

<div id="endModal">
  <div class="card" id="endContent"></div>
</div>

<script>
let players=[], scores=[], currentPlayer=0;
let questions=[], questionPool=[];
let remaining=0;
let currentCell=null;
let numKabooms=5, numHearts=5;

function selectPlayers(n){
 let html='';
 for(let i=0;i<n;i++){
  let def = i===0 ? 'Salva' : 'Julia';
  html += `<input id="p${i}" value="${def}"><br>`;
 }
 inputs.innerHTML = html;
 inputs.dataset.n = n;
 options.style.display='block';
 startBtn.style.display = 'block';

 // Mostrar selector de turno si hay 2 jugadores
 starterSelect.style.display = n==2 ? 'block' : 'none';
}

async function startGame(){
 let n = inputs.dataset.n;
 players=[]; scores=[];

 for(let i=0;i<n;i++){
  players.push(document.getElementById(`p${i}`).value);
  scores.push(0);
 }

 numKabooms = parseInt(document.getElementById('kabooms').value)||5;
 numHearts = parseInt(document.getElementById('hearts').value)||5;

 let totalCells=30;
 if(numKabooms+numHearts > totalCells){
  alert('Demasiados elementos');
  return;
 }

 await loadQuestions();

 // quién empieza
 if(n==2){
  let starter = document.getElementById('starter').value;
  currentPlayer = starter==='random' ? Math.floor(Math.random()*2) : parseInt(starter);
 }

 splash.style.display='none';
 game.style.display='block';
 newGame();
}

function goMenu(){ game.style.display='none'; splash.style.display='flex'; }

async function loadQuestions(){
 try{
  const res = await fetch('preguntas.json');
  const data = await res.json();
  questionPool = data.sort(()=>Math.random()-0.5);
 }catch{
  questionPool=[{q:'2+2',a:'4'}];
 }
}

function newGame(){
 questions=[...questionPool];
 grid.innerHTML='';

 let letters=['A','B','C','D','E','F'];

 let qCount = 30 - numKabooms - numHearts;
 remaining = qCount;
 let items=[
  ...Array(qCount).fill('q'),
  ...Array(numKabooms).fill('kaboom'),
  ...Array(numHearts).fill('heart')
 ].sort(()=>Math.random()-0.5);

 items.forEach((t,i)=>{
  let row=Math.floor(i/6)+1;
  let col=letters[i%6];
  let c=document.createElement('div');
  c.className='cell';

  c.innerHTML=`
   <div class="inner">
     <div class="face">${col}${row}</div>
     <div class="face back"></div>
   </div>`;

  c.onclick=()=>clickCell(c,t);
  grid.appendChild(c);
 });
 updateUI();
}

function clickCell(cell,type){
 if (document.querySelectorAll('.cell:not(.flip)').length === 0) {
   endGame();
 }

 if(cell.classList.contains('flip')) return;
 cell.classList.add('flip');
 let back = cell.querySelector('.back');

 if(type==='heart'){
  scores[currentPlayer]+=5;
  back.innerHTML='+5 ❤️';
  next();
 }
 else if(type==='kaboom'){
  scores[currentPlayer]-=5;
  back.innerHTML='💣';
  next();
 }
 else{
  if(questions.length===0){ endGame(); return; }
  currentCell=back;
  let q=questions.pop();
  document.getElementById('q').innerText=q.q;
  document.getElementById('a').innerText=q.a;
  document.getElementById('a').style.display='none';
  modal.style.display='flex';
 }
 updateUI();
}

function toggleAnswer(){
 let a=document.getElementById('a');
 a.style.display = a.style.display==='none'?'block':'none';
}

function answer(ok){
 modal.style.display='none';
 remaining--;
 if(ok){ scores[currentPlayer]+=4; currentCell.innerHTML='Q +4'; }
 else{ currentCell.innerHTML='Q 0'; }
 if(remaining<=0) endGame(); else next();
 updateUI();
}

function next(){ currentPlayer=(currentPlayer+1)%players.length; }

function updateUI(){
 document.getElementById('turn').innerText='Turno de: '+players[currentPlayer];
 document.getElementById('remaining').innerText='Total preguntas: '+remaining;
 document.getElementById('players').innerHTML = players.map((p,i)=>
  `<div class="${i===currentPlayer?'active':''}">${p}: ${scores[i]}</div>`
 ).join('');
}

function endGame(){
 let winner = players.map((p,i)=>({p,score:scores[i]})).sort((a,b)=>b.score-a.score)[0];

 endContent.innerHTML = `
  <h2>🎉 Ganador 🎉</h2>
  <h1>${winner.p}</h1>
  <p>${winner.score} puntos</p>
  <br>
  <button onclick="newGame(); endModal.style.display='none'">Nueva partida</button>
  <button onclick="goMenu(); endModal.style.display='none'">Menú principal</button>
 `;

 endModal.style.display='flex';
 confetti();
}

function confetti(){
 for(let i=0;i<80;i++){
  let c=document.createElement('div');
  c.style.position='fixed';
  c.style.width='6px';
  c.style.height='6px';
  c.style.background=`hsl(${Math.random()*360},100%,50%)`;
  c.style.top='0';
  c.style.left=Math.random()*100+'%';
  document.body.appendChild(c);

  let fall=setInterval(()=>{
    c.style.top=(parseFloat(c.style.top)+5)+'px';
  },30);

  setTimeout(()=>{clearInterval(fall); c.remove();},2000);
 }
}
</script>

</body>
</html>
